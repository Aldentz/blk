<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Halo</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-image: url('https://images.unsplash.com/photo-1687463221020-b8769b32c622');
    background-size: cover;
    background-repeat: no-repeat;
    background-position: center;
}

/* container tengah */
.wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* card */
.card {
    background-color: rgba(0,0,0,0.7);
    padding: 20px;
    border-radius: 10px;
    text-align: center;
    color: white;
    width: 300px;
}

/* gambar */
.card img {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    object-fit: cover;
}

/* tombol */
.btn {
    display: inline-block;
    margin-top: 15px;
    padding: 10px 20px;
    background-color: lightblue;
    text-decoration: none;
    font-weight: bold;
    color: black;
    border-radius: 5px;
}
</style>
</head>

<body>

<div class="wrapper">
    <div class="card">
        <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="foto">

        <h2>Aldent Zavani</h2>
        <p>Mahasiswa Sistem Informasi</p>

        <p>Sedang belajar HTML, CSS, dan dasar web development.</p>

        <hr>

        <p>Usia: 20</p>
        <p>Kampus: STMIK Dharmapala Riau</p>

        <a href="perkenalan.html" class="btn">Kembali</a>
    </div>
</div>

</body>
</html>
